services:
  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"   # Redis
      - "8001:8001"   # RedisInsight UI
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      args:
        # Set INSTALL_LOCAL_EMBEDDINGS=true in .env for the 100% local path
        # (installs sentence-transformers + torch). Default is the slim image.
        INSTALL_LOCAL_EMBEDDINGS: ${INSTALL_LOCAL_EMBEDDINGS:-false}
        # Set INSTALL_OCR=true in .env to OCR scanned PDFs (Tesseract + PyMuPDF).
        INSTALL_OCR: ${INSTALL_OCR:-false}
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Container-internal overrides (point at the redis service).
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    # Lets the container reach an Ollama server running on the host (Linux).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  redis_data:
