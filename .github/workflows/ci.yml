name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest

  integration-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      redis:
        image: redis/redis-stack-server:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      REDIS_URL: redis://localhost:6379
      # Fail (don't skip) if Redis/RediSearch is missing in this dedicated job.
      REQUIRE_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests against real Redis Stack
        run: pytest -m integration --cov-fail-under=0

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build
        run: |
          npm install
          npm run build

  deploy:
    # Gate: only deploy after ALL checks pass, and only on a real push to
    # master (never on pull requests). If any test job fails, this is skipped.
    needs: [backend-tests, integration-tests, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Detect which top-level app changed in this push so we only redeploy the
      # affected service (e.g. a backend-only commit won't rebuild the frontend).
      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

      - name: Trigger Render deploy — backend (chat-rag-api)
        if: steps.changes.outputs.backend == 'true'
        run: curl -fsS "${{ secrets.RENDER_DEPLOY_HOOK_API }}"

      - name: Trigger Render deploy — frontend (chat-rag-web)
        if: steps.changes.outputs.frontend == 'true'
        run: curl -fsS "${{ secrets.RENDER_DEPLOY_HOOK_WEB }}"
